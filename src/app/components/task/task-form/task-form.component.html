<div>
  <form [formGroup]="taskForm" class="task-form" (ngSubmit)="taskFromOnSubmit()">
    <div class="form__title mb-2">
      <mat-form-field class="w-100">
        <input formControlName="title" matInput placeholder="{{mode === StateMode.Add ? 'Add new task...' : ''}}">
        <mat-error *ngIf="titleControl?.hasError('required')">
          Please enter task title
        </mat-error>
      </mat-form-field>
    </div>
  
    <div class="form__description mb-2">
      <mat-form-field class="w-100">
        <mat-label>Description</mat-label>
        <textarea formControlName="description" matInput rows="3"></textarea>
      </mat-form-field>
    </div>
  
    <div class="d-flex align-items-center justify-betwwen">
      <div class="form__date flex-1 mr-2">
        <mat-form-field class="w-100">
          <mat-label>Due Date</mat-label>
          <input formControlName="dueDate" matInput [matDatepicker]="picker" />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="form__piority flex-1">
        <mat-form-field class="w-100">
          <mat-label>Piority</mat-label>
          <mat-select formControlName="piority">
            <mat-option *ngFor="let piority of piorities" [value]="piority.value">
              {{piority.name}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
  
    <div class="form__actions">
      <ng-content></ng-content>
    </div>
  </form>
</div>
