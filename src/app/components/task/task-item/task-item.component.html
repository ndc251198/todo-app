<mat-expansion-panel
  hideToggle
  [expanded]="expanded"
  class="task-item"
  [class]="{'task-item--done': task?.done}"
>
  <mat-expansion-panel-header class="flex-wrap">
    <mat-panel-title (click)="$event.stopPropagation()">
      <div
        class="w-100 d-flex align-items-center justify-content-between flex-no-wrap"
      >
        <div class="d-flex align-items-center">
          <mat-checkbox
            class="mr-2"
            (change)="ckbTaskOnChange($event)"
            [checked]="checked"
          ></mat-checkbox>
          <span class="task-item__title">{{ task?.title || "" }}</span>
        </div>

        <div class="d-flex align-items-center">
          <button
            mat-flat-button
            color="primary"
            class="mr-2"
            (click)="btnDetailOnClick()"
          >
            Detail
          </button>
          <button
            mat-flat-button
            color="warn"
            (click)="btnRemoveOnClick(task.id)"
          >
            Remove
          </button>
        </div>
      </div>
    </mat-panel-title>
  </mat-expansion-panel-header>
  <app-task-form
    [task]="task"
    [mode]="StateMode.Edit"
    (submitTask)="taskFormOnSubmit($event)"
  >
    <button mat-flat-button color="primary" class="w-100">Update</button>
  </app-task-form>
</mat-expansion-panel>
